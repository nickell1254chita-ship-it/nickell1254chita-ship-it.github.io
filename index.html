<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>学校祭マップ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Helvetica Neue", sans-serif;
    background: #f2f2f7;
    color: #000;
    overscroll-behavior: none;
  }
  #app {
    position: relative;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
  }

  /* === マップエリア === */
  #map-area {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #f2f2f7;
    overflow: hidden;
    touch-action: none;
  }
  #map-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transform-origin: center center;
    transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  .floor-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    pointer-events: none;
    transform: scale(1.04);
    transition: opacity 0.38s cubic-bezier(0.4,0,0.2,1), transform 0.38s cubic-bezier(0.4,0,0.2,1);
  }
  .floor-svg.active {
    opacity: 1;
    pointer-events: auto;
    transform: scale(1);
  }
  .floor-svg.exit {
    opacity: 0;
    transform: scale(0.97);
    pointer-events: none;
  }

  /* === トップバー（フィルターのみ） === */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(242,242,247,0.78);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-bottom: 0.5px solid rgba(0,0,0,0.06);
  }
  .top-bar-title { display: none; }
  .title-text { display: none; }

  /* === フィルターバー === */
  .filter-bar {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 10px 14px 10px;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  /* コントロール */
  .map-controls {
    position: absolute;
    top: 64px;
    right: 12px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .control-stack {
    background: rgba(242,242,247,0.78);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-radius: 14px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.5) inset, 0 2px 10px rgba(0,0,0,0.08);
    overflow: hidden;
    border: 0.5px solid rgba(255,255,255,0.6);
  }
  .control-btn {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: #007aff;
    font-size: 20px;
    cursor: pointer;
    border-bottom: 0.5px solid rgba(0,0,0,0.07);
  }
  .control-btn:last-child { border-bottom: none; }
  .control-btn:active { background: rgba(0,0,0,0.04); }

  /* === フロアセレクター === */
  .floor-selector {
    background: rgba(242,242,247,0.78);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-radius: 14px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.5) inset, 0 2px 10px rgba(0,0,0,0.08);
    overflow: hidden;
    border: 0.5px solid rgba(255,255,255,0.6);
  }
  .floor-btn {
    display: block;
    width: 44px;
    height: 38px;
    border: none;
    background: transparent;
    font-size: 13px;
    font-weight: 600;
    color: #8e8e93;
    cursor: pointer;
    border-bottom: 0.5px solid rgba(0,0,0,0.07);
    letter-spacing: -0.3px;
  }
  .floor-btn:last-child { border-bottom: none; }
  .floor-btn.active { color: #007aff; background: rgba(0,122,255,0.1); }
  .floor-btn:active { background: rgba(0,0,0,0.04); }

  /* フィルターチップ */
  .filter-chip {
    flex-shrink: 0;
    padding: 6px 13px;
    border-radius: 20px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 0.5px solid rgba(255,255,255,0.8);
    font-size: 13px;
    font-weight: 500;
    color: #3a3a3c;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }
  .filter-chip.active {
    background: #007aff;
    color: white;
    border-color: transparent;
    box-shadow: 0 2px 8px rgba(0,122,255,0.3);
  }
  .filter-chip .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
  }

  /* === ピン === */
  .pin {
    position: absolute;
    transform: translate(-50%, -100%);
    cursor: pointer;
    z-index: 10;
    transition: opacity 0.2s;
    will-change: left, top;
  }
  .pin.hidden { opacity: 0.12; pointer-events: none; }
  .pin:active .pin-icon { transform: scale(1.18); }
  .pin-icon { transition: transform 0.15s ease; }

  /* ピンアイコン — Apple Maps風：白地に色付きSVG */
  .pin-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18), 0 1px 2px rgba(0,0,0,0.1);
    margin: 0 auto;
  }
  .pin-icon svg { display: block; }
  .pin-label {
    margin-top: 4px;
    font-size: 10px;
    font-weight: 600;
    color: #1a1a1a;
    text-align: center;
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 2px 6px;
    border-radius: 5px;
    white-space: nowrap;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    letter-spacing: -0.2px;
  }

  /* ジャンルカラー — 白地に色アイコン */
  .pin-food    .pin-icon { background: #fff; }
  .pin-food    .pin-icon svg { stroke: #ff5722; }
  .pin-attraction .pin-icon { background: #fff; }
  .pin-attraction .pin-icon svg { stroke: #8e24aa; }
  .pin-exhibit .pin-icon { background: #fff; }
  .pin-exhibit .pin-icon svg { stroke: #0288d1; }
  .pin-stage   .pin-icon { background: #fff; }
  .pin-stage   .pin-icon svg { stroke: #d81b60; }
  .pin-facility .pin-icon { background: #fff; }
  .pin-facility .pin-icon svg { stroke: #555; }

  /* === 検索バー（下部固定） === */
  .search-bar-wrap {
    position: absolute;
    left: 0; right: 0;
    bottom: 0;
    z-index: 150;
    padding: 16px 14px max(20px, env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(242,242,247,0.95) 55%, rgba(242,242,247,0));
    pointer-events: none;
    transition: opacity 0.28s ease, transform 0.28s ease;
  }
  .search-bar-wrap.hidden-by-sheet {
    transform: translateY(40px);
    opacity: 0;
  }
  .search-bar {
    pointer-events: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(242,242,247,0.78);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-radius: 16px;
    padding: 12px 16px;
    box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset, 0 2px 14px rgba(0,0,0,0.08);
    border: 0.5px solid rgba(255,255,255,0.7);
    cursor: text;
  }
  .search-bar svg { flex-shrink: 0; color: #8e8e93; }
  .search-input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-size: 16px;
    color: #000;
    font-family: inherit;
    caret-color: #007aff;
  }
  .search-input::placeholder { color: #aeaeb2; }
  .search-clear {
    display: none;
    background: #c7c7cc;
    border: none;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: white;
    cursor: pointer;
    flex-shrink: 0;
    padding: 0;
  }
  .search-clear.visible { display: flex; }

  /* 検索結果ドロップダウン */
  .search-results {
    display: none;
    position: absolute;
    left: 16px; right: 16px;
    bottom: calc(100% - 8px);
    background: rgba(255,255,255,0.98);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 14px;
    box-shadow: 0 -2px 16px rgba(0,0,0,0.10), 0 0 0 0.5px rgba(0,0,0,0.07);
    overflow: hidden;
    max-height: 280px;
    overflow-y: auto;
  }
  .search-results.open { display: block; }
  .search-result-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 16px;
    border-bottom: 0.5px solid rgba(0,0,0,0.06);
    cursor: pointer;
  }
  .search-result-item:last-child { border-bottom: none; }
  .search-result-item:active { background: rgba(0,0,0,0.04); }
  .search-result-icon {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .search-result-icon svg { stroke: #555; }
  .search-result-name { font-size: 15px; font-weight: 500; color: #000; }
  .search-result-sub { font-size: 12px; color: #8e8e93; margin-top: 1px; }
  .search-no-result {
    padding: 20px 16px;
    text-align: center;
    font-size: 14px;
    color: #8e8e93;
  }

  /* === タブバー（下部固定） === */
  .tab-bar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: calc(56px + env(safe-area-inset-bottom));
    background: rgba(242,242,247,0.88);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-top: 0.5px solid rgba(0,0,0,0.1);
    display: flex;
    align-items: flex-start;
    padding-top: 6px;
    z-index: 500;
  }
  .tab-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    border: none;
    background: none;
    cursor: pointer;
    padding: 4px 0;
    color: #8e8e93;
    transition: color 0.15s;
  }
  .tab-item.active { color: #007aff; }
  .tab-item svg { display: block; }
  .tab-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: -0.2px;
  }

  /* タブバー分だけマップ・検索バーのbottomをずらす */
  #map-area { bottom: calc(56px + env(safe-area-inset-bottom)); }
  .search-bar-wrap {
    bottom: calc(56px + env(safe-area-inset-bottom));
  }

  /* === 全店舗メニュー一覧ページ === */
  .list-page {
    position: absolute;
    inset: 0;
    bottom: calc(56px + env(safe-area-inset-bottom));
    z-index: 200;
    background: #f2f2f7;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: translateY(100%);
    transition: transform 0.42s cubic-bezier(0.32, 0.72, 0.34, 1);
    pointer-events: none;
  }
  .list-page.active {
    transform: translateY(0);
    pointer-events: auto;
  }

  .list-nav {
    padding: 12px 16px 0;
    background: rgba(242,242,247,0.88);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-bottom: 0.5px solid rgba(0,0,0,0.08);
    flex-shrink: 0;
  }
  .list-nav-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #000;
    margin: 0 0 10px;
  }

  /* ジャンルタブ */
  .list-genre-tabs {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 0 0 0;
  }
  .list-genre-tabs::-webkit-scrollbar { display: none; }
  .list-genre-tab {
    flex-shrink: 0;
    padding: 10px 16px;
    border: none;
    background: none;
    font-size: 14px;
    font-weight: 500;
    color: #8e8e93;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
  }
  .list-genre-tab.active { color: #007aff; border-bottom-color: #007aff; font-weight: 600; }

  /* 店舗カードリスト */
  .list-scroll {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    padding: 12px 14px 20px;
  }

  /* 店舗セクション */
  .list-shop-section {
    margin-bottom: 28px;
  }
  .list-shop-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    padding: 12px 14px;
    background: #fff;
    border-radius: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    cursor: pointer;
  }
  .list-shop-header:active { background: #f5f5f7; }
  .list-shop-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: #f2f2f7;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .list-shop-info { flex: 1; min-width: 0; }
  .list-shop-name {
    font-size: 15px;
    font-weight: 700;
    color: #000;
    letter-spacing: -0.2px;
  }
  .list-shop-meta {
    font-size: 12px;
    color: #8e8e93;
    margin-top: 1px;
  }
  .list-shop-chevron {
    color: #c7c7cc;
    flex-shrink: 0;
  }

  /* メニューアイテムのリスト形式 */
  .list-menu-items {
    background: #fff;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  .list-menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-bottom: 0.5px solid rgba(0,0,0,0.06);
  }
  .list-menu-item:last-child { border-bottom: none; }
  .list-menu-emoji {
    font-size: 28px;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f2f2f7;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .list-menu-info { flex: 1; min-width: 0; }
  .list-menu-name {
    font-size: 14px;
    font-weight: 600;
    color: #000;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .list-menu-desc {
    font-size: 12px;
    color: #8e8e93;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .list-menu-price {
    font-size: 14px;
    font-weight: 700;
    color: #000;
    flex-shrink: 0;
    letter-spacing: -0.3px;
  }
  .list-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 700;
    background: #ff3b30;
    color: #fff;
    margin-left: 5px;
    vertical-align: middle;
  }
  .list-no-menu {
    padding: 12px 14px;
    font-size: 13px;
    color: #8e8e93;
    text-align: center;
  }

  /* === メニューページ === */
  .menu-page {
    position: absolute;
    inset: 0;
    z-index: 400;
    background: #f2f2f7;
    transform: translateX(100%);
    transition: transform 0.38s cubic-bezier(0.32,0.72,0.34,1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .menu-page.open { transform: translateX(0); }

  .menu-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px 16px 8px;
    background: rgba(242,242,247,0.82);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-bottom: 0.5px solid rgba(0,0,0,0.08);
    position: relative;
    flex-shrink: 0;
  }
  .menu-back {
    position: absolute;
    left: 14px;
    background: none;
    border: none;
    color: #007aff;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 0;
  }
  .menu-nav-title {
    font-size: 17px;
    font-weight: 700;
    color: #000;
    letter-spacing: -0.3px;
  }
  .menu-nav-sub {
    font-size: 12px;
    color: #8e8e93;
    text-align: center;
    margin-top: 1px;
  }

  /* カテゴリタブ */
  .menu-tabs {
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    background: rgba(242,242,247,0.82);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 0.5px solid rgba(0,0,0,0.1);
    flex-shrink: 0;
    padding: 0 4px;
  }
  .menu-tabs::-webkit-scrollbar { display: none; }
  .menu-tab {
    flex-shrink: 0;
    padding: 10px 16px;
    border: none;
    background: none;
    font-size: 14px;
    font-weight: 500;
    color: #8e8e93;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
  }
  .menu-tab.active {
    color: #007aff;
    border-bottom-color: #007aff;
    font-weight: 600;
  }

  /* メニューリスト */
  .menu-scroll {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    padding: 16px 14px 40px;
  }
  .menu-category-title {
    font-size: 20px;
    font-weight: 700;
    color: #000;
    margin: 4px 2px 4px;
    letter-spacing: -0.4px;
  }
  .menu-category-sub {
    font-size: 13px;
    color: #8e8e93;
    margin: 0 2px 12px;
  }
  .menu-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }
  .menu-card {
    background: #fff;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    position: relative;
    cursor: default;
  }
  .menu-card-img {
    width: 100%;
    aspect-ratio: 1;
    background: #f2f2f7;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    overflow: hidden;
  }
  .menu-card-img img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .menu-card-body {
    padding: 10px 10px 12px;
  }
  .menu-card-name {
    font-size: 14px;
    font-weight: 600;
    color: #000;
    line-height: 1.35;
    margin-bottom: 6px;
    letter-spacing: -0.2px;
  }
  .menu-card-price {
    font-size: 17px;
    font-weight: 700;
    color: #000;
    letter-spacing: -0.5px;
  }
  .menu-card-price span {
    font-size: 12px;
    font-weight: 500;
    color: #8e8e93;
  }
  .menu-card-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: #ff3b30;
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 10px;
  }
  .menu-card-desc {
    font-size: 12px;
    color: #6e6e73;
    margin-top: 4px;
    line-height: 1.4;
  }
  .menu-empty {
    text-align: center;
    padding: 60px 20px;
    color: #8e8e93;
    font-size: 15px;
  }

  /* 詳細パネルのメニューボタン */
  .menu-open-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    margin: 0 0 0;
    padding: 13px 16px;
    background: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    color: #007aff;
    cursor: pointer;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .menu-open-btn svg { opacity: 0.4; }

  /* === 詳細パネル === */
  .detail-sheet {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: rgba(242,242,247,0.78);
    backdrop-filter: blur(40px) saturate(180%);
    -webkit-backdrop-filter: blur(40px) saturate(180%);
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -1px 0 rgba(0,0,0,0.08), 0 -4px 24px rgba(0,0,0,0.10);
    z-index: 200;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.32, 0.72, 0.34, 1);
    max-height: 72vh;

    padding: 14px 16px 4px;
    gap: 8px;
  }
  .sheet-share {
    width: 32px; height: 32px;

    font-size: 13px;
    color: #6e6e73;

    background: rgba(120,120,128,0.16);
    border: none;
    width: 32px; height: 32px;
    border-radius: 50%;

    font-size: 13px;
    cursor: pointer;
    flex-shrink: 0;

    display: flex;
    gap: 10px;

    align-items: center;
    gap: 3px;

  .action-btn-secondary {

    border-radius: 12px;
    padding: 12px 8px;
    font-size: 13px;

    align-items: center;
    gap: 3px;
    line-height: 1.2;

    justify-content: center;
    gap: 8px;
    padding: 13px 16px;

    display: flex;
    padding: 6px 16px 14px;

    gap: 12px;

  .fav-item-remove {

};

let currentFloor = 3;

let currentZoom = 1;
let panX = 0, panY = 0;

// ========== マップサイズ計算 ==========
const VIEWBOX_W = 1000;
const VIEWBOX_H = 700;

// ========== ジャンル別アイコン（Lucide SVGパス）==========
const GENRE_ICONS = {
  food:       `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>`,

  exhibit:    `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>`,
  stage:      `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,
  facility:   `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
};

// ========== ピン描画（スクリーン座標・map-canvasの外に配置） ==========
// ズーム・パン後にピン位置を再計算する
function getMapMetrics() {
  const area = document.getElementById('map-area');
  const w = area.clientWidth;
  const h = area.clientHeight;
  const scale = Math.min(w / VIEWBOX_W, h / VIEWBOX_H);
  const renderedW = VIEWBOX_W * scale;
  const renderedH = VIEWBOX_H * scale;
  const offsetX = (w - renderedW) / 2;
  const offsetY = (h - renderedH) / 2;
  return { scale, offsetX, offsetY, w, h };
}

// SVG座標 → ズーム・パン・回転適用後のスクリーン座標に変換
function svgToScreen(sx, sy) {
  const area = document.getElementById('map-area');
  const W = area.clientWidth;
  const H = area.clientHeight;
  const m = getMapMetrics();

  // SVG内座標 → canvasローカル座標
  const lx = m.offsetX + sx * m.scale;
  const ly = m.offsetY + sy * m.scale;

  // canvasの中心を原点に
  const cx = W / 2, cy = H / 2;
  const dx = lx - cx, dy = ly - cy;

  // 回転
  const rad = mapRotation * Math.PI / 180;
  const rx = dx * Math.cos(rad) - dy * Math.sin(rad);
  const ry = dx * Math.sin(rad) + dy * Math.cos(rad);

  // スケール＋パン＋スクリーン座標
  return {
    x: cx + rx * currentZoom + panX,
    y: cy + ry * currentZoom + panY,
  };
}

function renderPins() {
  const layer = document.getElementById('pins-layer');
  layer.innerHTML = '';

  SHOPS.filter(s => s.floor === currentFloor).forEach(shop => {
    const pin = document.createElement('div');
    pin.className = `pin pin-${shop.genre}`;
    if (currentFilter !== 'all' && currentFilter !== shop.genre) {
      pin.classList.add('hidden');
    }
    const pos = svgToScreen(shop.x, shop.y);
    pin.style.left = pos.x + 'px';
    pin.style.top  = pos.y + 'px';
    pin.style.pointerEvents = 'auto';
    pin.innerHTML = `
      <div class="pin-icon">${GENRE_ICONS[shop.genre] || GENRE_ICONS.facility}</div>
      <div class="pin-label">${shop.label}</div>
    `;
    pin.addEventListener('click', (e) => {
      e.stopPropagation();
      openDetail(shop);
    });
    layer.appendChild(pin);
  });
}

// ズーム・パン変化のたびにピン位置を更新
function updatePinPositions() {
  document.querySelectorAll('#pins-layer .pin').forEach((pin, i) => {
    const shops = SHOPS.filter(s => s.floor === currentFloor);
    if (!shops[i]) return;
    const pos = svgToScreen(shops[i].x, shops[i].y);
    pin.style.left = pos.x + 'px';
    pin.style.top  = pos.y + 'px';
  });
}

// ========== フロア切替（アニメーション付き） ==========
function switchFloor(floor) {
  if (floor === currentFloor) return;
  const allSvgs = document.querySelectorAll('.floor-svg');
  const nextSvg = document.querySelector(`.floor-svg[data-floor="${floor}"]`);
  const prevSvg = document.querySelector(`.floor-svg[data-floor="${currentFloor}"]`);

  // 方向判定（上へ行くか下へ行くか）
  const goingUp = floor > currentFloor;

  // 前のフロアをexit
  if (prevSvg) {
    prevSvg.style.transition = 'opacity 0.28s ease, transform 0.28s ease';
    prevSvg.style.transform = goingUp ? 'scale(0.96) translateY(8px)' : 'scale(1.04) translateY(-8px)';
    prevSvg.style.opacity = '0';
    prevSvg.style.pointerEvents = 'none';
  }

  // 次のフロアを準備してからfade-in
  if (nextSvg) {
    nextSvg.style.transition = 'none';
    nextSvg.style.transform = goingUp ? 'scale(1.04) translateY(-10px)' : 'scale(0.96) translateY(10px)';
    nextSvg.style.opacity = '0';
    nextSvg.style.pointerEvents = 'auto';
    // 1フレーム待ってからアニメーション開始
    requestAnimationFrame(() => requestAnimationFrame(() => {
      nextSvg.style.transition = 'opacity 0.35s cubic-bezier(0.4,0,0.2,1), transform 0.35s cubic-bezier(0.4,0,0.2,1)';
      nextSvg.style.transform = 'scale(1) translateY(0)';
      nextSvg.style.opacity = '1';
      nextSvg.classList.add('active');
    }));
  }

  // prevをcleanup
  setTimeout(() => {
    if (prevSvg) {
      prevSvg.classList.remove('active');
      prevSvg.style.transform = '';
      prevSvg.style.opacity = '';
      prevSvg.style.transition = '';
    }
  }, 350);

  currentFloor = floor;
  document.querySelectorAll('.floor-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.floor) === floor);
  });
  renderPins();
  closeDetail();
}

// ========== フィルター ==========

// ========== トランスフォーム ==========
let mapRotation = 0;
// panX/panY は「マップ全体をどれだけ画面上でずらすか」（ピクセル）
// ズームはtransform-origin:center centerで行うため、
// zoomAroundで視点中心を保つようpanを補正する

function applyTransform(noTransition) {
  const canvas = document.getElementById('map-canvas');
  if (noTransition) canvas.style.transition = 'none';
  canvas.style.transform =
    `translate(${panX}px, ${panY}px) rotate(${mapRotation}deg) scale(${currentZoom})`;
  if (noTransition) requestAnimationFrame(() => { canvas.style.transition = ''; });
  updatePinPositions();
}

// (anchorX, anchorY): 画面上でズームの中心にしたい点（ピクセル）
function zoomAround(newZoom, anchorX, anchorY) {
  const area = document.getElementById('map-area');
  const W = area.clientWidth;
  const H = area.clientHeight;
  // canvas の center は (W/2 + panX, H/2 + panY)
  // anchorを固定したままzoomするには:
  // anchor - center_after = (anchor - center_before) * (newZoom/oldZoom)
  const ratio = newZoom / currentZoom;
  const cx = W / 2 + panX;
  const cy = H / 2 + panY;
  panX = anchorX - ratio * (anchorX - cx) - W / 2;
  panY = anchorY - ratio * (anchorY - cy) - H / 2;
  currentZoom = newZoom;
  applyTransform();
}

document.getElementById('zoom-in').addEventListener('click', () => {
  const area = document.getElementById('map-area');
  // 視点の中心 = 画面の中心
  const cx = area.clientWidth / 2;
  const cy = area.clientHeight / 2;
  zoomAround(Math.min(currentZoom + 0.25, 4), cx, cy);
});
document.getElementById('zoom-out').addEventListener('click', () => {
  const area = document.getElementById('map-area');
  const cx = area.clientWidth / 2;
  const cy = area.clientHeight / 2;
  zoomAround(Math.max(currentZoom - 0.25, 0.5), cx, cy);
});

// ========== パン＋ピンチズーム ==========
let isDragging = false;
let dragStartX = 0, dragStartY = 0, panStartX = 0, panStartY = 0;
let pinchStartDist = 0, pinchStartZoom = 1, pinchStartMidX = 0, pinchStartMidY = 0;
let pinchPanStartX = 0, pinchPanStartY = 0;
let isPinching = false;
const mapArea = document.getElementById('map-area');
const canvas = document.getElementById('map-canvas');

function getTouchDist(t) {
  const dx = t[0].clientX - t[1].clientX;
  const dy = t[0].clientY - t[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}
function getTouchMid(t) {
  return {
    x: (t[0].clientX + t[1].clientX) / 2,
    y: (t[0].clientY + t[1].clientY) / 2,
  };
}

// --- マウス（1本指ドラッグ） ---
function onMouseDown(e) {
  if (e.target.closest('.pin') || e.target.closest('.detail-sheet') || e.target.closest('.search-bar-wrap')) return;
  isDragging = true;
  dragStartX = e.clientX; dragStartY = e.clientY;
  panStartX = panX; panStartY = panY;
  canvas.style.transition = 'none';
}
function onMouseMove(e) {
  if (!isDragging) return;
  panX = panStartX + (e.clientX - dragStartX);
  panY = panStartY + (e.clientY - dragStartY);
  applyTransform();
}
function onMouseUp() { isDragging = false; canvas.style.transition = ''; }

mapArea.addEventListener('mousedown', onMouseDown);
window.addEventListener('mousemove', onMouseMove);
window.addEventListener('mouseup', onMouseUp);

// --- タッチ ---
mapArea.addEventListener('touchstart', (e) => {
  if (e.target.closest('.detail-sheet') || e.target.closest('.search-bar-wrap')) return;

  if (e.touches.length === 2) {
    // ピンチ開始
    isPinching = true;
    isDragging = false;
    canvas.style.transition = 'none';
    pinchStartDist = getTouchDist(e.touches);
    pinchStartZoom = currentZoom;
    const mid = getTouchMid(e.touches);
    pinchStartMidX = mid.x;
    pinchStartMidY = mid.y;
    pinchPanStartX = panX;
    pinchPanStartY = panY;
  } else if (e.touches.length === 1 && !isPinching) {
    // 1本指パン開始
    if (e.target.closest('.pin')) return;
    isDragging = true;
    dragStartX = e.touches[0].clientX;
    dragStartY = e.touches[0].clientY;
    panStartX = panX; panStartY = panY;
    canvas.style.transition = 'none';
  }
}, { passive: true });

mapArea.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2 && isPinching) {
    e.preventDefault();
    const dist = getTouchDist(e.touches);
    const mid = getTouchMid(e.touches);

    // 感度を抑える（0.55乗で緩やかに）
    const rawRatio = dist / pinchStartDist;
    const dampedRatio = Math.pow(rawRatio, 0.55);
    const newZoom = Math.min(Math.max(pinchStartZoom * dampedRatio, 0.5), 4);

    // 指の中点を視点中心としてzoomAround
    // ただし連続更新なので直接計算する
    const area = document.getElementById('map-area');
    const W = area.clientWidth;
    const H = area.clientHeight;
    const ratio = newZoom / currentZoom;
    const cx = W / 2 + panX;
    const cy = H / 2 + panY;
    panX = mid.x - ratio * (mid.x - cx) - W / 2;
    panY = mid.y - ratio * (mid.y - cy) - H / 2;
    currentZoom = newZoom;
    applyTransform(true);
  } else if (e.touches.length === 1 && isDragging && !isPinching) {
    panX = panStartX + (e.touches[0].clientX - dragStartX);
    panY = panStartY + (e.touches[0].clientY - dragStartY);
    applyTransform(true);
  }
}, { passive: false });

mapArea.addEventListener('touchend', (e) => {
  if (e.touches.length < 2) isPinching = false;
  if (e.touches.length === 0) {
    isDragging = false;
    canvas.style.transition = '';
  }
}, { passive: true });

// ========== 詳細パネル 下スワイプで閉じる ==========
(function() {
  const sheet = document.getElementById('detail-sheet');
  let swipeStartY = 0;
  let swipeStartScroll = 0;
  let isSwiping = false;

  sheet.addEventListener('touchstart', (e) => {
    swipeStartY = e.touches[0].clientY;
    swipeStartScroll = sheet.scrollTop;
    isSwiping = false;
  }, { passive: true });

  sheet.addEventListener('touchmove', (e) => {
    const dy = e.touches[0].clientY - swipeStartY;
    // スクロール位置が上端かつ下方向スワイプのときだけ追従
    if (dy > 0 && sheet.scrollTop <= 0) {
      isSwiping = true;
      sheet.style.transition = 'none';
      sheet.style.transform = `translateY(${Math.min(dy, 300)}px)`;
      e.preventDefault();
    }
  }, { passive: false });

  sheet.addEventListener('touchend', (e) => {
    if (!isSwiping) return;
    const dy = e.changedTouches[0].clientY - swipeStartY;
    sheet.style.transition = '';
    if (dy > 80) {
      // 80px以上引っ張ったら閉じる
      sheet.style.transform = '';
      closeDetail();
    } else {
      // 戻す
      sheet.style.transform = '';
    }
    isSwiping = false;
  }, { passive: true });
})();

// ========== ジャイロ（方位） ==========
let gyroActive = false;
let gyroHandler = null;
let lastAlpha = null;

function updateGyroNeedle(alpha) {
  const needle = document.querySelector('#gyro-btn .gyro-needle');
  if (needle) needle.style.transform = `rotate(${alpha}deg)`;
}

async function requestGyroPermission() {
  try {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      const perm = await DeviceOrientationEvent.requestPermission();
      return perm === 'granted';
    }
    return true;
  } catch(e) { return false; }
}

function startGyro() {
  gyroHandler = (e) => {
    try {
      let alpha = e.alpha ?? 0;
      if (e.webkitCompassHeading != null) alpha = e.webkitCompassHeading;
      mapRotation = -alpha;
      applyTransform(true);
      updateGyroNeedle(alpha);
    } catch(err) {}
  };
  window.addEventListener('deviceorientation', gyroHandler, true);
}

function stopGyro() {
  if (gyroHandler) {
    window.removeEventListener('deviceorientation', gyroHandler, true);
    gyroHandler = null;
  }
  // スムーズに北向きに戻す
  mapRotation = 0;
  applyTransform();
  const needle = document.querySelector('#gyro-btn .gyro-needle');
  if (needle) needle.style.transform = '';
}

document.getElementById('gyro-btn').addEventListener('click', async () => {
  const btn = document.getElementById('gyro-btn');
  if (gyroActive) {
    gyroActive = false;
    btn.classList.remove('active');
    stopGyro();
  } else {
    const ok = await requestGyroPermission();
    if (!ok) {
      alert('方位センサーへのアクセスが許可されませんでした。\nブラウザの設定から許可してください。');
      return;
    }
    gyroActive = true;
    btn.classList.add('active');
    startGyro();
  }
});

// ========== 検索 ==========
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');
const searchClear = document.getElementById('search-clear');

function renderSearchResults(query) {
  const q = query.trim().toLowerCase();
  searchResults.innerHTML = '';
  if (!q) { searchResults.classList.remove('open'); return; }

  const matched = SHOPS.filter(s =>
    s.name.toLowerCase().includes(q) ||
    s.label.toLowerCase().includes(q) ||
    s.org.toLowerCase().includes(q) ||
    GENRES[s.genre].name.toLowerCase().includes(q)
  ).slice(0, 8);

  if (matched.length === 0) {
    searchResults.innerHTML = `<div class="search-no-result">「${query}」に一致する出店が見つかりません</div>`;
  } else {
    matched.forEach(shop => {
      const item = document.createElement('div');
      item.className = 'search-result-item';
      item.innerHTML = `
        <div class="search-result-icon" style="background:white; border: 1px solid rgba(0,0,0,0.07);">${GENRE_ICONS[shop.genre] || ''}</div>
        <div>
          <div class="search-result-name">${shop.name}</div>
          <div class="search-result-sub">${shop.floor}F · ${GENRES[shop.genre].name} · ${shop.org}</div>
        </div>
      `;
      item.addEventListener('click', () => {
        closeSearch();
        if (shop.floor !== currentFloor) switchFloor(shop.floor);
        setTimeout(() => openDetail(shop), shop.floor !== currentFloor ? 400 : 0);
      });
      searchResults.appendChild(item);
    });
  }
  searchResults.classList.add('open');
}

function closeSearch() {
  searchInput.value = '';
  searchClear.classList.remove('visible');
  searchResults.classList.remove('open');
  searchInput.blur();
}

searchInput.addEventListener('input', (e) => {
  const v = e.target.value;
  searchClear.classList.toggle('visible', v.length > 0);
  renderSearchResults(v);
});

searchInput.addEventListener('focus', () => {
  if (searchInput.value) renderSearchResults(searchInput.value);
});

searchClear.addEventListener('click', () => closeSearch());

document.addEventListener('click', (e) => {
  if (!e.target.closest('#search-bar-wrap')) {

// ========== タブ切り替え ==========
let currentTab = 'map';

function switchTab(tab) {
  const prev = currentTab;
  currentTab = tab;
  document.getElementById('tab-map').classList.toggle('active', tab === 'map');
  document.getElementById('tab-list').classList.toggle('active', tab === 'list');

  const listPage = document.getElementById('list-page');
  if (tab === 'list') {
    closeDetail();
    renderListPage(listGenreFilter || 'all');
    // 下から上へスライドイン
    listPage.style.transition = 'none';
    listPage.style.transform = 'translateY(100%)';
    listPage.classList.add('active');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      listPage.style.transition = '';
      listPage.style.transform = 'translateY(0)';
    }));
  } else {
    // 上から下へスライドアウト
    listPage.style.transform = 'translateY(100%)';
    setTimeout(() => listPage.classList.remove('active'), 420);
  }
}

document.getElementById('tab-map').addEventListener('click', () => switchTab('map'));
document.getElementById('tab-list').addEventListener('click', () => switchTab('list'));

// ========== 全店舗メニュー一覧 ==========
let listGenreFilter = 'all';
const GENRE_ORDER = ['all', 'food', 'attraction', 'exhibit', 'stage', 'facility'];

function renderListPage(genre) {
  const prevGenre = listGenreFilter;
  listGenreFilter = genre;

  document.querySelectorAll('.list-genre-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.genre === genre);
  });

  const scroll = document.getElementById('list-scroll');
  const shops = SHOPS.filter(s => genre === 'all' || s.genre === genre);

  // 方向判定（右タブ→左からイン、左タブ→右からイン）
  const prevIdx = GENRE_ORDER.indexOf(prevGenre);
  const nextIdx = GENRE_ORDER.indexOf(genre);
  const dir = nextIdx >= prevIdx ? 1 : -1; // 1=右へ進む, -1=左へ戻る

  // 現在のコンテンツを退場させてから新コンテンツをイン
  scroll.style.transition = 'transform 0.22s ease, opacity 0.18s ease';
  scroll.style.transform = `translateX(${-dir * 28}px)`;
  scroll.style.opacity = '0';

  setTimeout(() => {
    // コンテンツを書き換え
    if (shops.length === 0) {
      scroll.innerHTML = '<div style="text-align:center;padding:60px 20px;color:#8e8e93;font-size:15px;">該当する出店がありません</div>';
    } else {
      scroll.innerHTML = buildListHTML(shops);
      bindListEvents(scroll);
    }
    scroll.scrollTop = 0;

    // 反対側から入ってくる
    scroll.style.transition = 'none';
    scroll.style.transform = `translateX(${dir * 28}px)`;
    scroll.style.opacity = '0';

    requestAnimationFrame(() => requestAnimationFrame(() => {
      scroll.style.transition = 'transform 0.28s cubic-bezier(0.25,0.1,0.25,1), opacity 0.22s ease';
      scroll.style.transform = 'translateX(0)';
      scroll.style.opacity = '1';
    }));
  }, 180);
}

function buildListHTML(shops) {
  return shops.map(shop => {
    const menu = MENUS[shop.id];
    const allItems = menu ? menu.categories.flatMap(c => c.items).slice(0, 4) : [];
    const totalItems = menu ? menu.categories.flatMap(c => c.items).length : 0;
    const genreColor = GENRES[shop.genre]?.color || '#8e8e93';

    const itemsHTML = allItems.length > 0
      ? `<div class="list-menu-items">
          ${allItems.map(item => `
            <div class="list-menu-item">
              <div class="list-menu-emoji">${item.emoji}</div>
              <div class="list-menu-info">
                <div class="list-menu-name">
                  ${item.name}
                  ${item.badge ? `<span class="list-badge">${item.badge}</span>` : ''}
                </div>
                ${item.desc ? `<div class="list-menu-desc">${item.desc}</div>` : ''}
              </div>
              <div class="list-menu-price">¥${item.price.toLocaleString()}</div>
            </div>
          `).join('')}
          ${totalItems > 4
            ? `<div class="list-no-menu" style="cursor:pointer;color:#007aff;" data-shopid="${shop.id}">他 ${totalItems - 4} 件を見る →</div>`
            : ''}
        </div>`
      : `<div class="list-no-menu">メニュー情報は準備中です</div>`;

    return `
      <div class="list-shop-section" data-shopid="${shop.id}">
        <div class="list-shop-header" data-shopid="${shop.id}">
          <div class="list-shop-icon">
            ${(GENRE_ICONS[shop.genre] || '').replace('stroke="currentColor"', `stroke="${genreColor}"`)}
          </div>
          <div class="list-shop-info">
            <div class="list-shop-name">${shop.name}</div>
            <div class="list-shop-meta">${shop.floor}F · ${shop.hours} · ${shop.price}</div>
          </div>
          <svg class="list-shop-chevron" width="7" height="12" viewBox="0 0 7 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 1l5 5-5 5"/></svg>
        </div>
        ${itemsHTML}
      </div>
    `;
  }).join('');
}

function bindListEvents(scroll) {
  scroll.querySelectorAll('.list-shop-header').forEach(el => {
    el.addEventListener('click', () => {
      const shop = SHOPS.find(s => s.id === el.dataset.shopid);
      if (!shop) return;
      switchTab('map');
      if (shop.floor !== currentFloor) switchFloor(shop.floor);
      setTimeout(() => openDetail(shop), shop.floor !== currentFloor ? 420 : 0);
    });
  });
  scroll.querySelectorAll('[data-shopid].list-no-menu').forEach(el => {
    if (!el.textContent.includes('見る')) return;
    el.addEventListener('click', () => {
      const shop = SHOPS.find(s => s.id === el.dataset.shopid);
      if (!shop) return;
      switchTab('map');
      setTimeout(() => {
        if (shop.floor !== currentFloor) switchFloor(shop.floor);
        setTimeout(() => { openDetail(shop); setTimeout(openMenuPage, 300); }, shop.floor !== currentFloor ? 420 : 0);
      }, 50);
    });
  });
}

// ========== メニューページ制御 ==========
let menuCurrentTab = 0;

function openMenuPage() {
  if (!currentShop) return;
  const menu = MENUS[currentShop.id];
  const page = document.getElementById('menu-page');
  document.getElementById('menu-shop-name').textContent = currentShop.name;
  document.getElementById('menu-shop-sub').textContent = `${currentShop.floor}F · ${currentShop.hours}`;
  menuCurrentTab = 0;

  if (!menu) {
    document.getElementById('menu-tabs').innerHTML = '';
    document.getElementById('menu-scroll').innerHTML =
      '<div class="menu-empty">メニューは準備中です</div>';
    page.classList.add('open');
    return;
  }

  // タブ生成
  const tabs = document.getElementById('menu-tabs');
  tabs.innerHTML = menu.categories.map((cat, i) =>
    `<button class="menu-tab ${i===0?'active':''}" data-idx="${i}">${cat.name}</button>`
  ).join('');
  tabs.querySelectorAll('.menu-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      menuCurrentTab = parseInt(btn.dataset.idx);
      tabs.querySelectorAll('.menu-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderMenuItems(menu);
    });
  });

  renderMenuItems(menu);
  page.classList.add('open');
}

function renderMenuItems(menu) {
  const cat = menu.categories[menuCurrentTab];
  const scroll = document.getElementById('menu-scroll');
  scroll.innerHTML = `
    <div class="menu-category-title">${cat.name}</div>
    ${cat.sub ? `<div class="menu-category-sub">${cat.sub}</div>` : ''}
    <div class="menu-grid">
      ${cat.items.map(item => `
        <div class="menu-card">
          <div class="menu-card-img">${item.emoji}</div>
          ${item.badge ? `<div class="menu-card-badge">${item.badge}</div>` : ''}
          <div class="menu-card-body">
            <div class="menu-card-name">${item.name}</div>
            ${item.desc ? `<div class="menu-card-desc">${item.desc}</div>` : ''}
            <div class="menu-card-price">¥${item.price.toLocaleString()}<span>〜</span></div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  scroll.scrollTop = 0;
}

function closeMenuPage() {
  document.getElementById('menu-page').classList.remove('open');
}

document.getElementById('menu-back').addEventListener('click', closeMenuPage);


// localStorage非対応環境（iOS WebView等）はメモリで代用
const storage = (() => {
  try {
    localStorage.setItem('__test__', '1');
    localStorage.removeItem('__test__');
    return localStorage;
  } catch(e) {
    const mem = {};
    return { getItem: k => mem[k] ?? null, setItem: (k,v) => { mem[k]=v; }, removeItem: k => { delete mem[k]; } };
  }
})();

let favorites = (() => {
  try { return JSON.parse(storage.getItem('fav') || '[]'); } catch(e) { return []; }
})();
let currentShop = null;

function saveFavorites() {
  try { storage.setItem('fav', JSON.stringify(favorites)); } catch(e) {}
}

function isFav(id) { return favorites.some(f => f.id === id); }

function toggleFavorite() {
  if (!currentShop) return;
  const btn = document.getElementById('d-save-btn');
  const label = document.getElementById('d-save-label');
  const icon = document.getElementById('d-save-icon');

  if (isFav(currentShop.id)) {
    favorites = favorites.filter(f => f.id !== currentShop.id);
    btn.classList.remove('saved');
    label.textContent = '保存';
    icon.querySelector('svg').style.fill = 'none';
  } else {
    favorites.push(currentShop);
    btn.classList.add('saved');
    label.textContent = '保存済';
    icon.querySelector('svg').style.fill = '#fff';
    icon.classList.add('star-pop');
    setTimeout(() => icon.classList.remove('star-pop'), 300);
  }
  saveFavorites();
  renderFavList();
}

function updateSaveBtn(shop) {
  const btn = document.getElementById('d-save-btn');
  const label = document.getElementById('d-save-label');
  const icon = document.getElementById('d-save-icon');
  if (isFav(shop.id)) {
    btn.classList.add('saved');
    label.textContent = '保存済';
    icon.querySelector('svg').style.fill = '#fff';
    icon.querySelector('svg').style.stroke = '#fff';
  } else {
    btn.classList.remove('saved');
    label.textContent = '保存';
    icon.querySelector('svg').style.fill = 'none';
    icon.querySelector('svg').style.stroke = 'currentColor';
  }
}

        </div>

  list.innerHTML = favorites.map(shop => `

  list.querySelectorAll('.fav-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('.fav-item-remove')) return;
      const shop = favorites.find(f => f.id === el.dataset.id);

  list.querySelectorAll('.fav-item-remove').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      favorites = favorites.filter(f => f.id !== btn.dataset.id);
      saveFavorites();
      renderFavList();
      // 詳細が開いてたら保存ボタン更新
      if (currentShop && currentShop.id === btn.dataset.id) updateSaveBtn(currentShop);
    });
  });
}

function openFavPanel() {
  renderFavList();
  document.getElementById('fav-panel').classList.add('open');
  document.getElementById('fav-overlay').classList.add('open');
}
function closeFavPanel() {
  document.getElementById('fav-panel').classList.remove('open');
  document.getElementById('fav-overlay').classList.remove('open');
}

document.getElementById('fav-open-btn').addEventListener('click', openFavPanel);
document.getElementById('fav-panel-close').addEventListener('click', closeFavPanel);
document.getElementById('fav-overlay').addEventListener('click', closeFavPanel);

// リサイズ対応
window.addEventListener('resize', renderPins);

// 初期化 — 3Fを正しく表示状態にセット
(function init() {
  const initSvg = document.querySelector(`.floor-svg[data-floor="${currentFloor}"]`);
  if (initSvg) {
    initSvg.style.opacity = '1';
    initSvg.style.transform = 'scale(1) translateY(0)';
    initSvg.style.pointerEvents = 'auto';
    initSvg.classList.add('active');
  }
  renderPins();
})();
} catch(e) { console.error('Map init error:', e); }
</script>
</body>
</html>
